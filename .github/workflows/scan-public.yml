name: Scan Public Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version to document in the workflow run.
        required: false
        type: string
  repository_dispatch:
    types:
      - package-published
  push:
    tags:
      - "n8n-nodes-plug-database@*"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Print scan target
        run: |
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "payload_package=${{ github.event.client_payload.package }}"
          echo "payload_version=${{ github.event.client_payload.version }}"
          echo "input_version=${{ inputs.version }}"
          npm view n8n-nodes-plug-database version

      - name: Scan public package
        run: npm run scan:public
