name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  CHANGESET_RELEASE_BRANCH: changeset-release/main

jobs:
  publish:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Print release context
        run: |
          node --version
          npm --version
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          npm view n8n-nodes-plug-database version || true

      - name: Install dependencies
        run: npm ci

      - name: Repair optional native bindings on Linux
        run: npm install --no-save @rolldown/binding-linux-x64-gnu @unrs/resolver-binding-linux-x64-gnu

      - name: Detect release mode
        id: release_mode
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          changeset_files=()
          for file in .changeset/*.md; do
            if [ "$(basename "$file")" != "README.md" ]; then
              changeset_files+=("$file")
            fi
          done

          local_version="$(node -p "require('./packages/n8n-nodes-plug-database/package.json').version")"
          npm_version_before="$(npm view n8n-nodes-plug-database version 2>/dev/null || true)"
          echo "local_version=${local_version}" >> "$GITHUB_OUTPUT"
          echo "npm_version_before=${npm_version_before}" >> "$GITHUB_OUTPUT"

          if [ "${#changeset_files[@]}" -gt 0 ]; then
            echo "mode=version-pr" >> "$GITHUB_OUTPUT"
            echo "Release mode: version-pr"
            printf 'Pending changesets:\n'
            printf ' - %s\n' "${changeset_files[@]}"
          else
            echo "mode=publish" >> "$GITHUB_OUTPUT"
            echo "Release mode: publish"
            echo "Local package version: ${local_version}"
            echo "Published npm version before release: ${npm_version_before:-not found}"
          fi

      - name: Verify workspace
        if: github.event_name == 'workflow_dispatch'
        run: npm run verify

      - name: Validate npm tarballs
        if: github.event_name == 'workflow_dispatch'
        run: npm run pack:check

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.10.0

      - name: Run Changesets release action
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run publish:packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version PR branch
        if: steps.release_mode.outputs.mode == 'version-pr'
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin "${CHANGESET_RELEASE_BRANCH}"
          git checkout "${CHANGESET_RELEASE_BRANCH}"
          npm run verify
          npm run pack:check

      - name: Verify npm published version
        id: verify_npm
        if: steps.release_mode.outputs.mode == 'publish'
        shell: bash
        run: |
          set -euo pipefail

          expected_version="${{ steps.release_mode.outputs.local_version }}"
          actual_version=""

          for attempt in {1..12}; do
            actual_version="$(npm view n8n-nodes-plug-database version 2>/dev/null || true)"
            if [ "${actual_version}" = "${expected_version}" ]; then
              echo "Verified n8n-nodes-plug-database@${actual_version} on npm."
              exit 0
            fi

            echo "Attempt ${attempt}: npm has '${actual_version:-not found}', expected '${expected_version}'. Waiting..."
            sleep 10
          done

          echo "::error::Expected n8n-nodes-plug-database@${expected_version} on npm, but latest is '${actual_version:-not found}'."
          exit 1

      - name: Delete changeset release branch
        if: steps.release_mode.outputs.mode == 'publish' && steps.verify_npm.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t pr_numbers < <(
            gh pr list \
              --head "${CHANGESET_RELEASE_BRANCH}" \
              --state open \
              --json number \
              --jq '.[].number'
          )

          for pr_number in "${pr_numbers[@]}"; do
            gh pr close "${pr_number}" \
              --comment "Closed automatically after successful npm publish."
            echo "Closed version pull request #${pr_number}."
          done

          encoded_ref="heads/${CHANGESET_RELEASE_BRANCH//\//%2F}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/${encoded_ref}" >/dev/null 2>&1; then
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/${encoded_ref}"
            echo "Deleted ${CHANGESET_RELEASE_BRANCH} after successful publish."
          else
            echo "${CHANGESET_RELEASE_BRANCH} is already absent; skipping cleanup."
          fi

      - name: Trigger public package scan
        if: steps.release_mode.outputs.mode == 'publish' && steps.release_mode.outputs.npm_version_before != steps.release_mode.outputs.local_version
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ steps.release_mode.outputs.local_version }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/dispatches" \
            --method POST \
            -f event_type=package-published \
            -f "client_payload[package]=n8n-nodes-plug-database" \
            -f "client_payload[version]=${PACKAGE_VERSION}"
