name: Publish

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: publish-${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Print release context
        run: |
          node --version
          npm --version
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          npm view n8n-nodes-plug-database version || true

      - name: Install dependencies
        run: npm ci

      - name: Repair optional native bindings on Linux
        run: npm install --no-save @rolldown/binding-linux-x64-gnu @unrs/resolver-binding-linux-x64-gnu

      - name: Verify workspace
        if: github.event_name == 'workflow_dispatch'
        run: npm run verify

      - name: Validate npm tarballs
        if: github.event_name == 'workflow_dispatch'
        run: npm run pack:check

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.10.0

      - name: Create version PR or publish packages
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run publish:packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
