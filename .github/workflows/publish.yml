name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Repair optional native bindings on Linux
        run: npm install --no-save @rolldown/binding-linux-x64-gnu @unrs/resolver-binding-linux-x64-gnu

      - name: Verify workspace
        run: npm run verify

      - name: Validate npm tarballs
        run: npm run pack:check

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Create version PR or publish packages
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run publish:packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
